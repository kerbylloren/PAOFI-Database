<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Payatas Orione Foundation Inc. Livelihood Program Database</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <div class="app-shell">
      <aside class="app-sidebar">
        <div class="brand-lockup">
          <div class="brand-mark" aria-hidden="true">
            <img src="/assets/paofi-logo.png" alt="">
          </div>
          <div>
            <strong>Payatas Orione Foundation Inc.</strong>
            <span>Livelihood Program Database</span>
          </div>
        </div>

        <nav class="app-nav" aria-label="Main navigation">
          <button type="button" data-route="menu" class="nav-item active">
            <span class="nav-icon" data-icon="home"></span>
            <span>Main Menu</span>
          </button>
          <button type="button" data-route="search" class="nav-item">
            <span class="nav-icon" data-icon="search"></span>
            <span>Search</span>
          </button>
          <button type="button" data-route="editor" class="nav-item">
            <span class="nav-icon" data-icon="edit"></span>
            <span>Editor</span>
          </button>
          <button type="button" data-route="viewer" class="nav-item">
            <span class="nav-icon" data-icon="view"></span>
            <span>Record Viewer</span>
          </button>
          <button type="button" data-route="database" class="nav-item">
            <span class="nav-icon" data-icon="table"></span>
            <span>Database</span>
          </button>
          <button type="button" data-route="monitoring" class="nav-item">
            <span class="nav-icon" data-icon="monitoring"></span>
            <span>Monitoring</span>
          </button>
          <button type="button" data-route="bin" class="nav-item">
            <span class="nav-icon" data-icon="bin"></span>
            <span>Record Bin</span>
          </button>
          <button type="button" data-route="accounts" class="nav-item nav-admin hidden">
            <span class="nav-icon" data-icon="users"></span>
            <span>Accounts</span>
          </button>
        </nav>

        <div class="sidebar-footer">
          <span id="currentUser"></span>
          <button type="button" id="logoutButton" class="sidebar-logout">Sign Out</button>
          <span id="databaseLocation">Local SQLite database</span>
        </div>
      </aside>

      <div class="app-main">
        <header class="topbar">
          <div>
            <p class="eyebrow">Payatas Orione Foundation Inc.</p>
            <h1 id="pageTitle">Main Menu</h1>
          </div>
          <div id="topbarActions" class="topbar-actions"></div>
        </header>

        <main id="pageRoot" class="page-root"></main>
      </div>
    </div>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>
    <section id="loginScreen" class="login-screen hidden" aria-label="Sign in">
      <form id="loginForm" class="login-panel">
        <img src="/assets/paofi-logo.png" alt="">
        <p class="eyebrow">Payatas Orione Foundation Inc.</p>
        <h1>Livelihood Program Database</h1>
        <label>
          Username
          <input id="loginUsername" name="username" autocomplete="username" required>
        </label>
        <label>
          Password
          <input id="loginPassword" name="password" type="password" autocomplete="current-password" required>
        </label>
        <button type="submit" class="action-button primary">Sign In</button>
        <p id="loginMessage" class="login-message"></p>
      </form>
    </section>
    <script src="/app.js"></script>
  </body>
</html>
